<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In – Brewery Distribution Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .brand-icon {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 12px;
    }

    .brand-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .brand-sub {
      font-size: .875rem;
      color: #6b7280;
      margin-bottom: 36px;
    }

    .sign-in-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, box-shadow .15s;
      width: 100%;
      justify-content: center;
    }

    .sign-in-btn:hover {
      background: #f9fafb;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .google-logo {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 28px 0;
    }

    .note {
      font-size: .8rem;
      color: #9ca3af;
      line-height: 1.5;
    }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: .875rem;
      margin-bottom: 20px;
      text-align: left;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-icon">&#127866;</div>
    <div class="brand-title">Brewery Distro</div>
    <div class="brand-sub">Distribution Manager</div>

    <div class="error-msg" id="error-msg"></div>

    <a class="sign-in-btn" href="/auth/google" id="sign-in-link">
      <!-- Google "G" SVG logo -->
      <svg class="google-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Sign in with Google
    </a>

    <hr class="divider" />
    <p class="note">Access is restricted to authorised company accounts only.</p>
  </div>

  <script>
    // Show an error message if the OAuth flow returned an error param.
    (function () {
      const params = new URLSearchParams(window.location.search);
      const err = params.get('error');
      if (err) {
        const el = document.getElementById('error-msg');
        const messages = {
          access_denied: 'Access denied. Make sure you are signing in with your company Google account.',
        };
        el.textContent = messages[err] || 'Sign-in failed. Please try again.';
        el.classList.add('visible');
      }
    })();
  </script>
</body>
</html>
